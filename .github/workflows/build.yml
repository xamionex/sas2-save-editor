name: Build

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Archive (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir out
          zip -j out/${{ github.event.repository.name }}-${{ matrix.os }}.zip target/release/${{ github.event.repository.name }}

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir out
          zip -j out/${{ github.event.repository.name }}-windows.zip target/release/${{ github.event.repository.name }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: out/
