name: Build

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu.2.28
            platform: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-msvc, x86_64-apple-darwin

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build release
        # We use zigbuild specifically for the Linux target to hit glibc 2.28
        # For Windows/macOS, zigbuild still works as a wrapper
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Create output directory
        run: mkdir out

      - name: Archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          find target -maxdepth 3 -name "${{ github.event.repository.name }}" -type f -not -path "*/deps/*" -exec cp {} out/ \; && cd out && zip -j -9 ${{ github.event.repository.name }}-${{ matrix.platform }}.zip ${{ github.event.repository.name }}

      - name: Archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $binPath = "target/${{ matrix.target }}/release/${{ github.event.repository.name }}.exe"
          Compress-Archive -CompressionLevel Optimal -Path $binPath -DestinationPath out/${{ github.event.repository.name }}-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifact
          path: out/*.zip

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('build-{0}', github.sha) }}
          name: "Build: ${{ github.ref_name || github.sha }}"
          body: "Automated build for ${{ matrix.platform }}"
          files: out/*.zip
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
